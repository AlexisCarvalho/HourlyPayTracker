<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Calcula Pagamento</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(6, 115, 75, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(6, 115, 75, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(6, 115, 75, 0.1);
      filter: blur(40px);
    }

    .shape1 {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 10%;
      animation: float 20s infinite ease-in-out;
    }

    .shape2 {
      width: 200px;
      height: 200px;
      bottom: 20%;
      right: 15%;
      animation: float 15s infinite ease-in-out reverse;
    }

    .shape3 {
      width: 250px;
      height: 250px;
      top: 60%;
      left: 70%;
      animation: float 18s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .container {
      max-width: 450px;
      width: 100%;
      position: relative;
      z-index: 1;
      opacity: 0;
    }

    .auth-card {
      background: rgba(20, 25, 23, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(6, 115, 75, 0.3);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #06734b, #09b073, #06734b);
      background-size: 200% 100%;
      animation: gradientShift 3s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .logo {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-icon {
      font-size: 3.5em;
      margin-bottom: 10px;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo h1 {
      color: #06734b;
      font-size: 1.8em;
      font-weight: 700;
      margin-bottom: 5px;
      text-shadow: 0 0 30px rgba(6, 115, 75, 0.3);
    }

    .logo p {
      color: #888;
      font-size: 0.9em;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.03);
      padding: 5px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab.active {
      background: linear-gradient(135deg, #06734b 0%, #055a3c 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(6, 115, 75, 0.4);
    }

    .tab:hover:not(.active) {
      background: rgba(6, 115, 75, 0.1);
      color: #09b073;
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 0.85em;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2em;
      color: #666;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    input[type="text"],
    input[type="code"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px 14px 45px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(6, 115, 75, 0.3);
      border-radius: 12px;
      color: #fff;
      font-size: 1em;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #06734b;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(6, 115, 75, 0.2);
    }

    input:focus + .input-icon {
      color: #06734b;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #06734b 0%, #055a3c 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(6, 115, 75, 0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.95em;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success {
      background: rgba(6, 115, 75, 0.2);
      border: 1px solid rgba(6, 115, 75, 0.5);
      color: #06734b;
    }

    .error {
      background: rgba(198, 40, 40, 0.2);
      border: 1px solid rgba(198, 40, 40, 0.5);
      color: #ff6b6b;
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      background: rgba(20, 25, 23, 0.95);
      padding: 0 15px;
      color: #666;
      font-size: 0.85em;
      position: relative;
      z-index: 1;
    }

    .footer-text {
      text-align: center;
      color: #666;
      font-size: 0.85em;
      margin-top: 25px;
    }

    .footer-text a {
      color: #06734b;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .footer-text a:hover {
      color: #09b073;
      text-decoration: underline;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .auth-card {
        padding: 30px 25px;
      }

      .logo h1 {
        font-size: 1.5em;
      }

      .logo-icon {
        font-size: 3em;
      }

      input[type="text"],
      input[type="code"],
      input[type="password"] {
        padding: 12px 14px 12px 42px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  
  <div class="floating-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <div class="container">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">⏱️</div>
        <h1>Calcula Pagamento</h1>
        <p>Controle seus valores</p>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Cadastro</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="form-content active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Código</label>
            <div class="input-wrapper">
              <input type="text" id="loginCode" required pattern="[A-Za-z0-9]+" title="Apenas letras e números" placeholder="ex: abc123">
              <span class="input-icon">🔑</span>
            </div>
          </div>

          <div class="form-group">
            <label>Senha</label>
            <div class="input-wrapper">
              <input type="password" id="loginPassword" required placeholder="••••••••">
              <span class="input-icon">🔒</span>
            </div>
          </div>

          <button type="submit" class="btn">Entrar</button>
          <div id="loginMessage"></div>
        </form>

        <div class="footer-text">
          Não tem uma conta? <a href="#" onclick="switchTab('register'); return false;">Cadastre-se</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="form-content">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Nome</label>
            <div class="input-wrapper">
              <input type="text" id="registerName" required placeholder="Seu nome completo">
              <span class="input-icon">👤</span>
            </div>
          </div>

          <div class="form-group">
            <label>Código</label>
            <div class="input-wrapper">
              <input type="text" id="registerCode" required pattern="[A-Za-z0-9]+" title="Apenas letras e números" placeholder="ex: abc123">
              <span class="input-icon">🔑</span>
            </div>
          </div>

          <div class="form-group">
            <label>Senha</label>
            <div class="input-wrapper">
              <input type="password" id="registerPassword" required placeholder="••••••••">
              <span class="input-icon">🔒</span>
            </div>
          </div>

          <button type="submit" class="btn">Criar Conta</button>
          <div id="registerMessage"></div>
        </form>

        <div class="footer-text">
          Já tem uma conta? <a href="#" onclick="switchTab('login'); return false;">Faça login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://192.168.0.162:8080';
    // GSAP Animation on load
    window.addEventListener("DOMContentLoaded", function() {
      gsap.to(".container", {
        opacity: 1,
        y: 0,
        duration: 1,
        ease: "power3.out"
      });
    });

    // Switch between login and register tabs
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab');
      const forms = document.querySelectorAll('.form-content');
      
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }

      // Clear messages
      document.getElementById('loginMessage').textContent = '';
      document.getElementById('registerMessage').textContent = '';
    }

    // Handle login
    async function handleLogin(e) {
      e.preventDefault();
      
      const code = document.getElementById('loginCode').value;
      const password = document.getElementById('loginPassword').value;
      const messageDiv = document.getElementById('loginMessage');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      messageDiv.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      try {
        const response = await fetch(`${API_URL}/users/login`, {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ code, password })
         });

         const result = await response.json();

         if (response.ok) {
           messageDiv.textContent = '✅ Login realizado com sucesso!';
           messageDiv.className = 'message success';
           
           // Store token if provided
           if (result.token) {
             localStorage.setItem('authToken', result.token);
           }
           
           // Redirect to dashboard after a certain amount of time
           setTimeout(() => {
             window.location.href = '/dashboard';
           }, 500);
         } else {
           messageDiv.textContent = '❌ ' + (result.error || 'Código ou senha incorretos');
           messageDiv.className = 'message error';
         }
       } catch (error) {
         messageDiv.textContent = '❌ Erro ao conectar: ' + error.message;
         messageDiv.className = 'message error';
       } finally {
         submitBtn.disabled = false;
         submitBtn.textContent = 'Entrar';
       }
     }

     // Handle register
     async function handleRegister(e) {
       e.preventDefault();
       
       const name = document.getElementById('registerName').value;
       const code = document.getElementById('registerCode').value;
       const password = document.getElementById('registerPassword').value;
       const messageDiv = document.getElementById('registerMessage');
       const submitBtn = e.target.querySelector('button[type="submit"]');
       
       messageDiv.textContent = '';
       submitBtn.disabled = true;
       submitBtn.textContent = 'Criando...';

       try {
         const response = await fetch(`${API_URL}/users/register`, {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ name, code, password })
         });

         const result = await response.json();

         if (response.ok) {
           messageDiv.textContent = '✅ Conta criada com sucesso! Faça login.';
           messageDiv.className = 'message success';
           
           // Clear form
           document.getElementById('registerName').value = '';
           document.getElementById('registerCode').value = '';
           document.getElementById('registerPassword').value = '';
           
           // Switch to login tab after a certain amount of time
           setTimeout(() => {
             switchTab('login');
             document.getElementById('loginCode').value = code;
           }, 500);
         } else {
           messageDiv.textContent = '❌ ' + (result.error || 'Erro ao criar conta');
           messageDiv.className = 'message error';
         }
       } catch (error) {
         messageDiv.textContent = '❌ Erro ao conectar: ' + error.message;
         messageDiv.className = 'message error';
       } finally {
         submitBtn.disabled = false;
         submitBtn.textContent = 'Criar Conta';
       }
     }
   </script>
</body>
</html>
